function importData() {
  const existing = JSON.parse(localStorage.getItem('mm_tx') || '[]');
  const existingIds = new Set(existing.map(t => t.id));
  const newTx = DATA.filter(t => !existingIds.has(t.id));
  const merged = [...newTx, ...existing].sort((a,b) => new Date(b.date) - new Date(a.date));
  localStorage.setItem('mm_tx', JSON.stringify(merged.slice(0, 500)));
  showStatus(`✅ นำเข้าสำเร็จ! เพิ่ม ${newTx.length} รายการ (ซ้ำ ${DATA.length - newTx.length} รายการ)`);
  renderPreview();
}

function clearData() {
  if (!confirm('ล้างข้อมูลเก่าทั้งหมดในแอป?')) return;
  localStorage.removeItem('mm_tx');
  showStatus('🗑️ ล้างข้อมูลเก่าแล้ว กดนำเข้าเลยครับ');
}

function showStatus(msg) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.style.display = 'block';
}

function renderPreview() {
  const list = document.getElementById('tx-list');
  const items = [...DATA].sort((a,b) => new Date(b.date) - new Date(a.date)).slice(0, 10);
  list.innerHTML = items.map(t => {
    const sign = t.type === 'income' ? '+' : '-';
    const cls = t.type === 'income' ? 'pos' : 'neg';
    const d = new Date(t.date);
    const dateStr = d.toLocaleDateString('th-TH', {day:'numeric', month:'short'});
    return `<div class="tx-item">
      <span>${t.catIcon} ${t.catName}${t.note ? ' · ' + t.note : ''}</span>
      <span class="${cls}">${sign}฿${t.amount.toLocaleString()}<br><small style="color:#ababab">${dateStr}</small></span>
    </div>`;
  }).join('');
}

renderPreview();
</script>
